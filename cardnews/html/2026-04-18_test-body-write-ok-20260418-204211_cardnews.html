  <script>
    function serializeAndDownload(svgElement, filename) {
      const serializer = new XMLSerializer();
      const clone = svgElement.cloneNode(true);
      if (!clone.getAttribute("xmlns")) {
        clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      }
      const source = serializer.serializeToString(clone);
      const payload = `<?xml version="1.0" encoding="UTF-8"?>
${source}`;
      const bytes = new TextEncoder().encode(payload);
      const blob = new Blob([bytes], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll(".download-button").forEach((button) => {
      button.addEventListener("click", () => {
        const targetId = button.getAttribute("data-target");
        const filename = button.getAttribute("data-filename");
        const svg = document.getElementById(targetId);
        if (svg) serializeAndDownload(svg, filename);
      });
    });

    document.getElementById("download-all").addEventListener("click", () => {
      document.querySelectorAll(".download-button").forEach((button, index) => {
        window.setTimeout(() => button.click(), index * 120);
      });
    });
  </script>
